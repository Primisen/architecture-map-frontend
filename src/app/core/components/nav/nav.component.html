<nav>
    <div class="navbar">
        <div class="container nav-container">
            <button
                (click)="toggleMenu()"
                type="button"
                class="inline-flex items-center p-2 w-10 h-10 justify-center rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200"
                aria-controls="navbar-default"
            >
                <span class="sr-only">Open main menu</span>
                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
                    <path
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M1 1h15M1 7h15M1 13h15"
                    />
                </svg>
            </button>
            <div
                [ngClass]="{ hidden: !isMenuOpen, 'w-full': true, 'md:block': true, 'md:w-auto': true }"
                id="navbar-default"
            >
                <ul>
                    <li *ngFor="let item of menuItems">
                        <a [routerLink]="item.link">{{ item.label | translate }}</a>
                    </li>
                    <li class="language-switcher">
                        <button *ngFor="let lang of languages" (click)="switchLanguage(lang.code)">
                            {{ lang.label }}
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>
