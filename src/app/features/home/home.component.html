<main>
    <article class="background flex items-center justify-center text-center">
        <div>
            <h1 class="text-white text-uppercase fw-bolt title">{{ 'HOME_PAGE.SITE_NAME' | translate }}</h1>
            <p class="text-white text-uppercase slogo">{{ 'HOME_PAGE.SLOGAN' | translate }}</p>
        </div>
    </article>

    <section
        class="content"
        infinite-scroll
        [infiniteScrollDisabled]="!infiniteScrollEnabled"
        [infiniteScrollDistance]="2"
        [infiniteScrollThrottle]="1000"
        (scrolled)="onScroll()"
    >
        <app-construction-image-masonry [constructionImages]="constructionImages" [loading]="loading" />
    </section>

    <footer class="bg-zinc-800 text-white py-4 mt-16">
        <div class="container mx-auto px-4">
            <div class="flex flex-wrap justify-between items-center">
                <div class="w-full md:w-1/3 text-center md:text-left mb-4 md:mb-0">
                    <h2 class="text-xl font-bold">{{ 'HOME_PAGE.SITE_NAME' | translate }}</h2>
                </div>
            </div>
        </div>
    </footer>
</main>
